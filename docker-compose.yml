services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: releaseguard
      POSTGRES_PASSWORD: releaseguard
      POSTGRES_DB: releaseguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U releaseguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://releaseguard:releaseguard@db:5432/releaseguard
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
